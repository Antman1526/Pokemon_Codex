# Kanto rival progression planning data.

chapter: kanto

progression_bands:
  kanto_start:
    player_range: "Pallet through Route 1"
    companions:
      red:
        location: Pallet Town / Route 1
        event: notices_unfamiliar_tracks
        notification: null
    rivals:
      blue:
        location: Oak Lab
        event: mandatory_first_battle
        notification: null
      ava:
        location: Oak Lab / Route 1
        event: registers_research_notes
        notification: "Ava spotted a Johto starter near Route 1."
      dax:
        location: Oak Lab / Route 1
        event: rushes_ahead
        notification: "Dax is heading for Viridian and talking about Brock already."

  viridian_arrival:
    player_range: "First Viridian visit"
    rivals:
      blue:
        location: Route 22
        event: optional_battle_tease
        notification: "Blue was seen testing his starter near Route 22."
      ava:
        location: Viridian Pokecenter
        event: worldlink_tutorial
        notification: "Ava uploaded early habitat notes to WorldLink."
      dax:
        location: Viridian Forest entrance
        event: bug_catcher_battle_report
        notification: "Dax beat a Bug Catcher and entered Viridian Forest."

  pre_brock:
    player_range: "Viridian Forest through Pewter"
    rivals:
      blue:
        location: Pewter City
        event: badge_race_dialogue
        notification: "Blue reached Pewter and is studying Brock's team."
      ava:
        location: Pewter Museum
        event: fossil_curiosity
        notification: "Ava found unusual fossil scan requests at the museum."
      dax:
        location: Pewter Gym lobby
        event: loses_or_wins_to_brock_based_on_flag
        notification: "Dax challenged Brock before you. He will not say how it went."

  post_brock:
    player_range: "After Boulder Badge"
    companions:
      red:
        location: Route 22 or Mt. Moon lead
        event: leaves_to_investigate_parallel_route
        notification: "Red is checking a second trail near Mt. Moon."
    rivals:
      blue:
        location: Route 3 gate
        event: rival_battle_or_warning
        notification: "Blue earned the Boulder Badge and moved toward Mt. Moon."
      ava:
        location: Museum service tunnel
        event: rocket_tag_support
        notification: "Ava requested backup near the Pewter Museum service tunnel."
      dax:
        location: Museum service tunnel
        event: rocket_double_battle_partner
        notification: "Dax found Rocket grunts carrying fossil scan data."

  vermilion_surge:
    player_range: "After S.S. Anne through Thunder Badge"
    companions:
      red:
        location: Vermilion Harbor / Gym entrance
        event: surge_ground_training_and_grid_warning
        notification: "Red marked the Vermilion Gym grid as Rocket-tampered."
      misty:
        location: Vermilion Harbor
        event: post_ss_anne_join_and_current_reading
        notification: "Misty logged the harbor current and confirmed the Johto signal is still locked."
    rivals:
      blue:
        location: Route 11
        event: rushing_after_ss_anne
        notification: "Blue cleared the S.S. Anne route and is racing toward Route 11."
      ava:
        location: Vermilion Harbor
        event: johto_resonance_research
        notification: "Ava logged Johto resonance from the harbor manifest."
      dax:
        location: Vermilion Gym lobby
        event: surge_training_report
        notification: "Dax beat a Sailor and is training for Surge."
      lyra:
        location: Johto locked profile
        event: first_locked_region_tease
        notification: "Locked profile detected: Lyra / Johto. Region access unavailable."

  route11_diglett_bridge:
    player_range: "After Thunder Badge before Rock Tunnel"
    companions:
      red:
        location: Route 11 / Diglett's Cave approach
        event: warm_route11_field_tool_guidance
        notification: "Red says Trail Cutter is reading Diglett's Cave as a field-tool calibration route."
      brock:
        location: Pewter Gym / WorldLink call
        event: rock_tunnel_field_advice
        notification: "Brock sent cave-prep advice: bring Ground answers, repel control, and a light source for Rock Tunnel."
    rivals:
      blue:
        location: Route 11
        event: rival_race_pressure
        notification: "Blue is pushing east on Route 11 and says Pokemon Tower will prove who is ahead."
      ava:
        location: Diglett's Cave survey note
        event: ground_route_research
        notification: "Ava logged Diglett's Cave as a natural tunnel that WorldLink can measure without unlocking Johto."
      dax:
        location: Route 11 engineer line
        event: engineer_training_loss
        notification: "Dax lost to an Engineer on Route 11, then called it 'data collection' and challenged him again."
      lyra:
        location: Johto locked profile
        event: lyra_signal_remains_locked
        notification: "Lyra's profile flickered again, but WorldLink still marks Johto travel as locked."

  rock_tunnel_lavender_approach:
    player_range: "Route 10 through first Lavender arrival"
    companions:
      brock:
        location: Route 10 Pokemon Center
        event: brock_cave_lantern_advice
        notification: "Brock registered Cave Lantern advice and told Antman to trust his footing in Rock Tunnel."
      red:
        location: Rock Tunnel 1F
        event: warm_rock_tunnel_companion_check
        notification: "Red entered Rock Tunnel with Antman and marked a safe line through the cave."
      misty:
        location: Cerulean / WorldLink call
        event: lavender_tower_waterline_warning
        notification: "Misty says the Lavender signal feels like still water before a storm."
    rivals:
      blue:
        location: Pokemon Tower approach
        event: pokemon_tower_race_pressure
        notification: "Blue is racing toward Pokemon Tower and wants the next mystery solved first."
      ava:
        location: Rock Tunnel survey notes
        event: low_light_static_research
        notification: "Ava logged low-light static from Rock Tunnel and asked Oak to compare it with Lavender Tower."
      dax:
        location: Route 10
        event: route10_training_report
        notification: "Dax trained on Route 10 and says cave darkness is just another opponent."
      lyra:
        location: Johto locked profile
        event: lyra_tower_signal_locked
        notification: "Lyra's locked profile pulsed when Lavender Tower appeared in WorldLink."

  pokemon_tower_moonlight_reveal:
    player_range: "Pokemon Tower through Mr. Fuji rescue"
    companions:
      red:
        location: Pokemon Tower 2F
        event: red_pokemon_tower_after_blue_check
        notification: "Red stayed with Antman after Blue's Tower challenge and says the grief signal reacted to Cubone's name."
      misty:
        location: WorldLink call from Cerulean
        event: misty_lavender_grief_warning
        notification: "Misty says Lavender feels like a tide pool after a storm: calm on top, dangerous underneath."
      brock:
        location: WorldLink call from Pewter
        event: brock_fuji_grounding_call
        notification: "Brock says Mr. Fuji knows the difference between a restless spirit and a human exploiting one."
    rivals:
      blue:
        location: Pokemon Tower 2F
        event: blue_tower_race_pressure
        notification: "Blue challenged Antman in Pokemon Tower and still insists the badge race matters more than ghost stories."
      ava:
        location: Lavender survey notes
        event: ava_moonlight_signal_research
        notification: "Ava tagged the Moonlight Veil as the first clean Team Moonlight signal in Kanto."
      dax:
        location: Route 8 training route
        event: dax_tower_bravery_report
        notification: "Dax claims he is not scared of Pokemon Tower, then asks if Ghost types can punch back."
      lyra:
        location: Johto locked profile
        event: lyra_moonlight_locked_profile
        notification: "Lyra's locked Johto profile flashed when Team Moonlight named itself, then vanished again."

  celadon_market_hideout:
    player_range: "Celadon arrival through Rocket Game Corner discovery"
    companions:
      red:
        location: Celadon market streets
        event: red_celadon_market_watch
        notification: "Red is watching the Celadon crowds and says Rocket feels too comfortable here."
      misty:
        location: WorldLink call from Cerulean
        event: misty_celadon_current_call
        notification: "Misty says money moves like water in Celadon: follow the current, not the noise."
      brock:
        location: WorldLink call from Pewter
        event: brock_celadon_patience_call
        notification: "Brock says Erika's Gym will reward patience before the Game Corner punishes impatience."
    rivals:
      blue:
        location: Game Corner sidewalk
        event: blue_game_corner_race
        notification: "Blue says he heard about the Rocket Game Corner first and claims Antman is late again."
      ava:
        location: Celadon Restaurant notes
        event: ava_gold_dust_buyer_research
        notification: "Ava tagged the Celadon buyer as Gold Dust and flagged rare Pokemon pedigree records."
      dax:
        location: Celadon arcade row
        event: dax_celadon_arcade_report
        notification: "Dax lost coins at the arcade, then called it tactical research into Rocket's economy."
      lyra:
        location: Johto locked profile
        event: lyra_celadon_locked_profile
        notification: "Lyra's locked profile pulsed when WorldLink scanned Celadon coins stamped with a bell pattern."

  rocket_hideout_b1f_infiltration:
    player_range: "Rocket Game Corner basement B1F"
    companions:
      red:
        location: Rocket Hideout B1F entrance
        event: red_hideout_entry_check
        notification: "Red entered the Rocket Hideout with Antman and says the basement sounds too organized to be only a Game Corner scam."
      misty:
        location: WorldLink call from Cerulean
        event: misty_hideout_current_call
        notification: "Misty says Rocket's coin traffic moves like a dirty current under Celadon. Follow the flow to the source."
      brock:
        location: WorldLink call from Pewter
        event: brock_hideout_grounding_call
        notification: "Brock says a real hideout leaves weight behind: crates, ledgers, and footprints. Check what Rocket forgot to hide."
    rivals:
      blue:
        location: Celadon Game Corner side room
        event: blue_hideout_race
        notification: "Blue claims he found the Rocket switch first and says Antman better not slow him down in the basement."
      ava:
        location: WorldLink research note
        event: ava_gold_dust_ledger_research
        notification: "Ava flagged a Gold Dust ledger entry tying the Celadon buyer to rare anchors and stolen prize Pokemon."
      dax:
        location: Celadon arcade stairwell
        event: dax_hideout_training_report
        notification: "Dax says hideout grunts are better training than arcade machines and asks if Rocket offers rematches."
      lyra:
        location: Johto locked profile
        event: lyra_hideout_locked_profile
        notification: "Lyra's locked profile flickered beside a bell-stamped coin in the Rocket ledger, then went quiet."

  giovanni_silph_scope_payoff:
    player_range: "Rocket Hideout B3F through Silph Scope pickup"
    companions:
      red:
        location: Rocket Hideout B4F
        event: red_giovanni_preboss_check
        notification: "Red waited before Giovanni's room and told Antman this boss feels quieter, colder, and more dangerous than the grunts."
      misty:
        location: WorldLink call from Cerulean
        event: misty_silph_scope_return_call
        notification: "Misty says the Silph Scope should cut through Lavender's still water and show what Rocket tried to hide."
      brock:
        location: WorldLink call from Pewter
        event: brock_giovanni_grounding_call
        notification: "Brock warns that Giovanni battles like a stone wall: patient, heavy, and built to make challengers rush."
    rivals:
      blue:
        location: Rocket Hideout B3F
        event: blue_hideout_late_arrival
        notification: "Blue reached B3F late and snapped that Antman better not let Red call this a solo victory."
      ava:
        location: WorldLink research note
        event: ava_meridian_signal_research
        notification: "Ava tagged Giovanni's Meridian prototype phrase as the first link between Rocket routes and future region anchors."
      dax:
        location: Rocket Hideout upper floors
        event: dax_giovanni_training_report
        notification: "Dax challenged three grunts in a row and says Giovanni sounds like the kind of boss who punishes sloppy teams."
      lyra:
        location: Johto locked profile
        event: lyra_meridian_locked_profile
        notification: "Lyra's locked profile flashed when Giovanni said Meridian, then WorldLink marked Johto still unavailable."

  silph_scope_lavender_return:
    player_range: "Silph Scope return through Poke Flute reward"
    companions:
      red:
        location: Pokemon Tower 6F
        event: red_marowak_grief_support
        notification: "Red stood with Antman when the Silph Scope revealed Marowak and says some battles are won by letting grief stop fighting."
      misty:
        location: WorldLink call from Cerulean
        event: misty_tower_aftercare_call
        notification: "Misty says Lavender's current finally moved after Marowak calmed, but something deeper is still pulling at Saffron."
      brock:
        location: WorldLink call from Pewter
        event: brock_fuji_route_call
        notification: "Brock says Fuji's Poke Flute should open the Snorlax roads, but the team should decide carefully between Fuchsia and Saffron pressure."
    rivals:
      blue:
        location: Lavender exit road
        event: blue_tower_pressure_reconsidered
        notification: "Blue left Lavender quieter than usual and says he is heading for the next badge before anyone calls him sentimental."
      ava:
        location: Lavender survey notes
        event: ava_marowak_signal_research
        notification: "Ava logged the Marowak reading as a clean grief signal and separated it from Rocket traffic and Moonlight whispers."
      dax:
        location: Route 12 Snorlax road
        event: dax_snorlax_training_report
        notification: "Dax found a sleeping Snorlax blocking the road and says waking it up counts as training if it swings first."
      lyra:
        location: Johto locked profile
        event: lyra_poke_flute_locked_profile
        notification: "Lyra's locked profile hummed along with the Poke Flute tone, then WorldLink kept Johto travel sealed."

  route12_snorlax_fuchsia_path:
    player_range: "Route 12 Snorlax through first Fuchsia arrival"
    companions:
      red:
        location: Route 12 Snorlax road
        event: red_snorlax_field_support
        notification: "Red stood by Antman at Route 12 and says the Poke Flute proves some roadblocks need patience before power."
      misty:
        location: Route 12 waterline
        event: misty_fuchsia_current_advice
        notification: "Misty says the current toward Fuchsia is open and warns that Saffron feels like water held behind a cracking wall."
    rivals:
      dax:
        location: Fuchsia City entrance
        event: dax_snorlax_wakeup_report
        notification: "Dax heard the Snorlax wake-up from the south road and insists he would have dodged the first Body Slam."
      blue:
        location: Saffron gate rumor
        event: blue_saffron_impatience_warning
        notification: "Blue is circling Saffron and says Fuchsia is a detour, which usually means he is about to learn why preparation matters."
