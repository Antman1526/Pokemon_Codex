    purpose: "Establish Antman, Red, rivals, starters, WorldLink, and first Rocket anomaly."
    required_maps: [pallet_town, oak_lab, route_1, viridian_city, route_2, viridian_forest, pewter_city, pewter_gym, pewter_museum_service_tunnel]
    required_events:
