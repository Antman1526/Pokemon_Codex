  - { act: act_1_pallet_to_pewter, map: route_1, state: follows_temporarily, purpose: "Connects Antman to Red's road." }
  - { act: act_1_pallet_to_pewter, map: pewter_museum_service_tunnel, state: tag_partner_backup, purpose: "Backup partner if Ava/Dax is not selected." }
  - { act: act_4_rock_tunnel_celadon_lavender, map: pokemon_tower, state: present_in_town, purpose: "Warns about dream danger." }
