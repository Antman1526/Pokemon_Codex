gym_leaders:
  brock:
    badge: Boulder Badge
    standard_cap: 12
    standard_feel: friendly_mainline_hard
    teaches: [team_planning, rock_type_answers]
  misty:
    badge: Cascade Badge
    standard_cap: 18
    standard_feel: fair_pressure
    teaches: [speed_control, water_answers, status]
  lt_surge:
    badge: Thunder Badge
    standard_cap: 24
    standard_feel: tactical_spike
    teaches: [ground_immunity, paralysis_management]
  erika:
    badge: Rainbow Badge
    standard_cap: 30
    standard_feel: status_puzzle
    teaches: [status_recovery, setup_prevention]
  koga:
    badge: Soul Badge
    standard_cap: 36
    standard_feel: attrition_pressure
    teaches: [poison, hazards, antidote_preparation]
  sabrina:
    badge: Marsh Badge
    standard_cap: 42
    standard_feel: special_attack_wall
    teaches: [special_bulk, priority, dark_ghost_bug_answers]
  blaine:
    badge: Volcano Badge
    standard_cap: 48
    standard_feel: weather_offense
    teaches: [sun_pressure, water_ground_rock_planning]
  giovanni:
    badge: Earth Badge
    standard_cap: 55
    standard_feel: boss_mastery
    teaches: [balanced_team_building, criminal_tech_gimmicks]

