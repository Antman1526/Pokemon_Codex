global_rules:
  - "Companions cannot fight Antman's gym battles."
  - "Companions can join villain tag battles and route/dungeon skirmishes."
  - "Companion dialogue should be concise and useful."
  - "Red is the primary full-game companion and should still leave space for Antman's agency."
  - "Ash, Brock, and Misty are long-term recurring companions after their Kanto arcs."
  - "Blue, May, and Bill rotate in for major arcs instead of always occupying the active travel party."
  - "Rotate companion presence to avoid overcrowding."
